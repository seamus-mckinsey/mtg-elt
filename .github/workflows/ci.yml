name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pre-commit/action@v3.0.1

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

  dbt-compile:
    name: dbt Compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transform
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync
        working-directory: .

      - name: Install dbt packages
        run: uv run dbt deps

      - name: Compile dbt models
        run: uv run dbt compile --target ci
